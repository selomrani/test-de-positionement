<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketMatch — FC GenV</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <h2 class="text-center mb-4">Réserver mon ticket</h2>
                <form action="" id="form">
                    <div class="d-flex justify-content-between m-100">
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Nom complet : </label>
                            <input type="text" class="form-control" name="fullname" id="fullname" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email : </label>
                            <input type="email" class="form-control" name="email" id="email">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="matches" class="form-label">Matches : </label>
                        <select class="form-select" name="matches" id="matches">
                            <option value="FC GenV vs OC Youssoufia">FC GenV vs OC Youssoufia — 15/03/2026</option>
                            <option value="FC GenV vs FC Bayern">FC GenV vs FC Bayern — 22/03/2026</option>
                            <option value="FC GenV vs Madrid CF">FC GenV vs Madrid CF — 05/04/2026</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <fieldset>
                            <legend class="h6">Places :</legend>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="place" id="Tribune" value="Tribune">
                                <label class="form-check-label" for="Tribune">Tribune</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="place" id="Virage" value="Virage">
                                <label class="form-check-label" for="Virage">Virage</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="place" id="Pelouse" value="Pelouse">
                                <label class="form-check-label" for="Pelouse">Pelouse</label>
                            </div>
                        </fieldset>
                    </div>

                    <div class="mb-3">
                        <label for="nombreticket" class="form-label">Nombre de tickets</label>
                        <input type="number" class="form-control" max="10" min="1" id="nombreticket">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="accept" id="accept">
                        <label class="form-check-label" for="accept">J'accepte les conditions générales</label>
                    </div>
                    <div class="d-flex justify-content-center">
                    <button type="submit" id="smbt" class="btn btn-success align-self-center">Réserver mon ticket</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
